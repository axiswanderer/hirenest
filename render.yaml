services:
  - type: web
    name: hirenest-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard — paste Neon URL
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ALLOWED_ORIGINS
        sync: false          # set after you know the Vercel URL
      - key: ADMIN_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false          # optional — leave blank to disable AI screening
